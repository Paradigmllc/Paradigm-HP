name: Deploy to Coolify

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify deployment
        run: |
          RESPONSE=$(curl -s -X GET \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            "https://coolify.appexx.me/api/v1/deploy?uuid=i12am4vvcbggefnqdizhnv9a&force=true")
          echo "Deploy response: $RESPONSE"
          DEPLOY_UUID=$(echo $RESPONSE | grep -o '"deployment_uuid":"[^"]*"' | cut -d'"' -f4)
          echo "DEPLOY_UUID=$DEPLOY_UUID" >> $GITHUB_ENV

      - name: Wait for deployment to complete
        run: |
          echo "Waiting for deployment $DEPLOY_UUID..."
          for i in $(seq 1 40); do
            sleep 20
            STATUS=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
              "https://coolify.appexx.me/api/v1/deployments/$DEPLOY_UUID" \
              | grep -o '"status":"[^"]*"' | head -1 | cut -d'"' -f4)
            echo "Attempt $i: Status = $STATUS"
            if [ "$STATUS" = "finished" ]; then
              echo "✅ Deployment succeeded!"
              exit 0
            elif [ "$STATUS" = "failed" ] || [ "$STATUS" = "error" ]; then
              echo "❌ Deployment failed with status: $STATUS"
              exit 1
            fi
          done
          echo "⚠️ Timeout waiting for deployment"
          exit 1
